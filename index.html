<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solutionwheel of Fortune</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --tile-size: 420px;
  --red: rgba(255,0,0,0.85);
  --grey-btn-bg: rgba(0,0,0,0.08);
  --grey-btn-border: rgba(0,0,0,0.16);
  --grey-btn-text: rgba(0,0,0,0.55);
}
body {
  margin:0; padding:32px 12px 40px;
  font-family: Arial, sans-serif;
  background:#fafafa;
}
h1 {
  text-align:center;
  color:var(--red);
  margin-bottom:34px;
}
.layout {
  display:flex;
  justify-content:center;
  gap:22px;
  flex-wrap:wrap;
}
.wheel-col,.board-col { width:var(--tile-size); }

.wheel-wrap {
  position:relative;
  width:var(--tile-size);
  height:var(--tile-size);
}
canvas {
  width:100%;
  height:100%;
  border-radius:50%;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
/* Arrow */
.pointer {
  position:absolute;
  top:-6px;
  left:50%;
  transform:translateX(-50%) rotate(180deg);
  width:0;height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:24px solid rgba(0,0,0,.85);
  z-index:5;
}
/* Center logo overlay */
.center-logo {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:4;
}
.center-logo img { width:38%; height:auto; }

button {
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:var(--red);
  color:white;
  cursor:pointer;
}
button:disabled { opacity:.6; cursor:not-allowed; }

.spin-row{
  width:100%;
  display:flex;
  justify-content:center;
  margin-top:18px;
}
#spinBtn{
  min-width:120px;
}

.panel {
  height:var(--tile-size);
  background:white;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  padding:14px;
  display:flex;
  flex-direction:column;
}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}
.panel-header h3{
  margin:0;
  font-size:16px;
  color: rgba(0,0,0,0.82);
}

#resetBtn{
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  background: var(--grey-btn-bg);
  color: var(--grey-btn-text);
  border:1px solid var(--grey-btn-border);
  opacity:0.9;
}
#resetBtn:hover{
  opacity:1;
  background: rgba(0,0,0,0.10);
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td {
  padding:8px;
  border-bottom:1px solid rgba(0,0,0,.06);
  text-align:left;
}
td.count,th.count { text-align:right; }
tr.leader td { font-weight:800; }
tr.last-picked td:first-child::after { content:" 🎉"; }

#result {
  margin-top:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

@media(max-width:900px){
  :root{--tile-size:min(420px,92vw);}
}
</style>
</head>
