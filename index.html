<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solutionwheel of Fortune - Vodafone Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --tile-size: 420px;
  --red: #e60000; /* Official Vodafone Red */
  --grey-btn-bg: rgba(0,0,0,0.08);
  --grey-btn-border: rgba(0,0,0,0.16);
  --grey-btn-text: rgba(0,0,0,0.55);
}
body {
  margin:0; padding:32px 12px 40px;
  font-family: Arial, sans-serif;
  background:#fafafa;
}
h1 {
  text-align:center;
  color:var(--red);
  margin-bottom:34px;
}
.layout {
  display:flex;
  justify-content:center;
  gap:22px;
  flex-wrap:wrap;
}
.wheel-col,.board-col { width:var(--tile-size); }

.wheel-wrap {
  position:relative;
  width:var(--tile-size);
  height:var(--tile-size);
}
canvas {
  width:100%;
  height:100%;
  border-radius:50%;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.pointer {
  position:absolute;
  top:-6px;
  left:50%;
  transform:translateX(-50%) rotate(180deg);
  width:0;height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:24px solid #333;
  z-index:5;
}
.center-logo {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:4;
}
/* Styling für das eingebettete SVG Logo */
.center-logo svg { 
    width: 25%; 
    height: auto; 
    filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2));
}

button {
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:var(--red);
  color:white;
  cursor:pointer;
  font-weight: bold;
}
button:disabled { opacity:.6; cursor:not-allowed; }

.spin-row{
  width:100%;
  display:flex;
  justify-content:center;
  margin-top:18px;
}
#spinBtn{
  min-width:120px;
}

.panel {
  height:var(--tile-size);
  background:white;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  padding:14px;
  display:flex;
  flex-direction:column;
}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}
.panel-header h3{
  margin:0;
  font-size:16px;
  color: rgba(0,0,0,0.82);
}

#resetBtn{
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  background: var(--grey-btn-bg);
  color: var(--grey-btn-text);
  border:1px solid var(--grey-btn-border);
  opacity:0.9;
}
#resetBtn:hover{
  opacity:1;
  background: rgba(0,0,0,0.10);
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td {
  padding:8px;
  border-bottom:1px solid rgba(0,0,0,.06);
  text-align:left;
}
td.count,th.count { text-align:right; }
tr.leader td { font-weight:800; }
tr.last-picked td:first-child::after { content:" 🎉"; }

#result {
  margin-top:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  min-height: 1.2em;
}

@media(max-width:900px){
  :root{--tile-size:min(420px,92vw);}
}
</style>
</head>
<body>
<h1>Solutionwheel of Fortune</h1>

<div class="layout">
  <div class="wheel-col">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>
      <div class="center-logo">
        <svg viewBox="0 0 2500 2500" xmlns="http://www.w3.org/2000/svg">
          <path d="M1250 0c690.37 0 1250 559.63 1250 1250S1940.37 2500 1250 2500 0 1940.37 0 1250 559.63 0 1250 0z" fill="#fff"/>
          <path d="M1276.1 487.35c-284.15 0-515.22 230.12-515.22 515.21 0 127.76 46.54 244.62 123.63 334.86L629.74 1957.5h277.67l148.06-339.29c61.64 45.41 138.16 72.33 220.63 72.33 211.23 0 382.46-171.22 382.46-382.45 0-211.24-171.23-382.46-382.46-382.46-118.06 0-222.95 53.64-292.05 137.51 32.54-52.09 51.52-114.13 51.52-180.59 0-186.23-150.8-337.03-337.03-337.03 3.65 0 7.23.13 10.82.38 52.85-53.14 125.75-86.13 206.71-86.13 162.24 0 293.75 131.51 293.75 293.74 0 45.54-10.37 88.66-28.93 127.13l213.91 213.91c53.39-100.93 84.01-215.7 84.01-337.51 0-212.18-128.53-394.27-309.84-471.19z" fill="#e60000"/>
        </svg>
      </div>
    </div>

    <div class="spin-row">
      <button id="spinBtn">Spin</button>
    </div>

    <div id="result"></div>
  </div>

  <div class="board-col">
    <div class="panel">
      <div class="panel-header">
        <h3>Leaderboard</h3>
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <table>
        <thead>
          <tr><th>Name</th><th class="count">Selections</th></tr>
        </thead>
        <tbody id="leaderBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const names = ["Mathias","Prachee","Argetim","Ayse","Shramik","Joana","Lubna","Sandeep","Wasim", "Stephan"];
const key = "solutionwheel_counts";
const lastKey = "solutionwheel_last";

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const resetBtn = document.getElementById("resetBtn");

let counts = JSON.parse(localStorage.getItem(key) || "{}");
let lastPicked = localStorage.getItem(lastKey);
names.forEach(n => counts[n] ??= 0);

function resize() {
  const size = Math.min(420, window.innerWidth * 0.92);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.height = size * dpr;
  canvas.style.width = canvas.style.height = size + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return size;
}

let size = resize();
let center = size / 2;
let radius = center - 10;
let slice = 2 * Math.PI / names.length;
let rot = 0;

function draw() {
  ctx.clearRect(0, 0, size, size);
  for(let i = 0; i < names.length; i++) {
    const n = names[i];
    const s = rot + i * slice;
    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, s, s + slice);
    // Vodafone Farben-Schema
    ctx.fillStyle = i % 2 ? "#e60000" : "#ff3333";
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(s + slice / 2);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "white";
    ctx.font = "bold 15px Arial";
    ctx.fillText(n, radius - 18, 0);
    ctx.restore();
  }
}
draw();

function renderBoard() {
  const rows = names.map(n => ({n: n, count: counts[n]}))
    .sort((a,b) => b.count - a.count || a.n.localeCompare(b.n));
  const tb = document.getElementById("leaderBody");
  tb.innerHTML = "";
  rows.forEach((r, i) => {
    const tr = document.createElement("tr");
    if(i === 0) tr.classList.add("leader");
    if(r.n === lastPicked) tr.classList.add("last-picked");
    tr.innerHTML = "<td>" + r.n + "</td><td class='count'>" + r.count + "</td>";
    tb.appendChild(tr);
  });
}
renderBoard();

function getWeightedIndex() {
  const sortedNames = [...names].sort((a, b) => counts[a] - counts[b]);
  const bottomFive = sortedNames.slice(0, 5);

  let pool = [];
  names.forEach((name, index) => {
    let weight = 1;
    if (counts[name] === 0) weight = 3;
    else if (bottomFive.includes(name)) weight = 2;

    for (let i = 0; i < weight; i++) {
      pool.push(index);
    }
  });

  return pool[Math.floor(Math.random() * pool.length)];
}

function mod(n, m) { return ((n % m) + m) % m; }
const pointerAngle = -Math.PI / 2;

function selectedIndexForRotation(rotation) {
  const angleAtPointer = mod(pointerAngle - rotation, 2 * Math.PI);
  return Math.floor(angleAtPointer / slice);
}

spinBtn.onclick = () => {
  if (spinBtn.disabled) return;
  spinBtn.disabled = true;
  document.getElementById("result").textContent = "Spinning...";

  const targetIdx = getWeightedIndex();
  const baseTarget = pointerAngle - (targetIdx + 0.5) * slice;
  const full = 2 * Math.PI;
  const minSpins = 6;
  const k = Math.ceil((rot - baseTarget) / full) + minSpins;
  const end = baseTarget + k * full;

  const start = rot;
  const t0 = performance.now();
  const duration = 4000;

  function easeOutCubic(p) { return 1 - Math.pow(1 - p, 3); }

  function anim(t) {
    const p = Math.min((t - t0) / duration, 1);
    const e = easeOutCubic(p);
    rot = start + (end - start) * e;
    draw();
    if (p < 1) {
        requestAnimationFrame(anim);
    } else {
      const sel = selectedIndexForRotation(rot);
      const picked = names[sel];

      counts[picked] = (counts[picked] || 0) + 1;
      lastPicked = picked;

      localStorage.setItem(key, JSON.stringify(counts));
      localStorage.setItem(lastKey, picked);

      renderBoard();
      document.getElementById("result").textContent = "🎉 Selected: " + picked;
      spinBtn.disabled = false;
    }
  }
  requestAnimationFrame(anim);
};

resetBtn.onclick = () => {
  names.forEach(n => counts[n] = 0);
  lastPicked = null;
  localStorage.removeItem(key);
  localStorage.removeItem(lastKey);
  renderBoard();
  document.getElementById("result").textContent = "";
};

window.addEventListener("resize", () => {
  size = resize();
  center = size / 2;
  radius = center - 10;
  slice = 2 * Math.PI / names.length;
  draw();
});
</script>
</body>
</html>
